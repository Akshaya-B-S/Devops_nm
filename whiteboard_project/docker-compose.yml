events {
    worker_connections 1024;
}

http {
    upstream whiteboard_backend {
        server whiteboard-app:8080;
    }
    
    upstream jenkins_backend {
        server jenkins:8080;
    }
    
    upstream sonarqube_backend {
        server sonarqube:9000;
    }
    
    upstream artifactory_backend {
        server artifactory:8081;
    }
    
    server {
        listen 80;
        server_name localhost;
        
        # Main application
        location / {
            proxy_pass http://whiteboard_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Health endpoint
        location /health {
            proxy_pass http://whiteboard_backend/health;
            access_log off;
        }
        
        # Jenkins
        location /jenkins {
            proxy_pass http://jenkins_backend/jenkins;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # SonarQube
        location /sonarqube {
            proxy_pass http://sonarqube_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # Artifactory
        location /artifactory {
            proxy_pass http://artifactory_backend/artifactory;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}