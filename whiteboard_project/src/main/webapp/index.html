<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whiteboard Pro - Creative Collaboration Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        
        .animated-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        
        .circle {
            position: absolute;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: float 20s infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
        
        .landing-container {
            position: relative;
            z-index: 1;
            text-align: center;
            color: white;
            max-width: 800px;
            padding: 2rem;
            animation: fadeInUp 1s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            font-size: 5rem;
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }
        
        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }
        
        .feature {
            background: rgba(255,255,255,0.1);
            padding: 1rem;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        .feature i {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: white;
            color: #667eea;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        
        .btn-secondary {
            background: transparent;
            color: white;
            border: 2px solid white;
        }
        
        .btn-secondary:hover {
            background: white;
            color: #667eea;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="animated-bg" id="animatedBg"></div>
    
    <div class="landing-container">
        <div class="logo">
            <i class="fas fa-chalkboard"></i>
        </div>
        <h1>Whiteboard Pro</h1>
        <div class="subtitle">
            Your Creative Collaboration Platform
        </div>
        
        <div class="features">
            <div class="feature">
                <i class="fas fa-paint-brush"></i>
                <h3>Free Drawing</h3>
                <p>Express your ideas freely</p>
            </div>
            <div class="feature">
                <i class="fas fa-users"></i>
                <h3>Collaboration</h3>
                <p>Work together in real-time</p>
            </div>
            <div class="feature">
                <i class="fas fa-cloud-upload-alt"></i>
                <h3>Cloud Sync</h3>
                <p>Access anywhere, anytime</p>
            </div>
        </div>
        
        <div class="btn-group">
            <a href="login.html" class="btn btn-primary">Get Started</a>
            <a href="#" class="btn btn-secondary" onclick="checkHealth()">System Status</a>
        </div>
        
        <div id="healthStatus" style="margin-top: 2rem; font-size: 0.9rem;"></div>
    </div>
    
    <script>
        // Create floating circles
        function createCircles() {
            const container = document.getElementById('animatedBg');
            for (let i = 0; i < 20; i++) {
                const circle = document.createElement('div');
                circle.className = 'circle';
                const size = Math.random() * 100 + 50;
                circle.style.width = size + 'px';
                circle.style.height = size + 'px';
                circle.style.left = Math.random() * 100 + '%';
                circle.style.top = Math.random() * 100 + '%';
                circle.style.animationDelay = Math.random() * 10 + 's';
                circle.style.animationDuration = Math.random() * 20 + 10 + 's';
                container.appendChild(circle);
            }
        }
        
        async function checkHealth() {
            const statusDiv = document.getElementById('healthStatus');
            statusDiv.innerHTML = '<div class="loading"></div> Checking system status...';
            
            try {
                const response = await fetch('/whiteboard/health');
                const data = await response.json();
                
                if (response.ok && data.status === 'UP') {
                    statusDiv.innerHTML = `
                        <div style="background: rgba(76, 175, 80, 0.9); padding: 10px; border-radius: 10px;">
                            ✅ System is healthy!<br>
                            Database: ${data.database}<br>
                            Version: ${data.version || '1.0'}
                        </div>
                    `;
                } else {
                    statusDiv.innerHTML = `
                        <div style="background: rgba(255, 87, 34, 0.9); padding: 10px; border-radius: 10px;">
                            ⚠️ System is degraded. Please try again later.
                        </div>
                    `;
                }
            } catch (error) {
                statusDiv.innerHTML = `
                    <div style="background: rgba(244, 67, 54, 0.9); padding: 10px; border-radius: 10px;">
                        ❌ Unable to connect to server. Please ensure the application is running.
                    </div>
                `;
            }
            
            setTimeout(() => {
                setTimeout(() => {
                    statusDiv.innerHTML = '';
                }, 5000);
            }, 1000);
        }
        
        createCircles();
        
        // Auto-redirect if already logged in
        async function checkAuth() {
            try {
                const response = await fetch('/whiteboard/api/auth/session');
                const data = await response.json();
                if (data.authenticated) {
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                // Not logged in, stay on landing page
                console.log('Not authenticated');
            }
        }
        
        checkAuth();
    </script>
</body>
</html>
