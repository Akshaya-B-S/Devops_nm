<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FluxBoard - Pro Whiteboard</title>
    <!-- Fabric.js & Font Awesome -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: #f5f7fb;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100%;
            position: relative;
        }

        /* Sidebar */
        .sidebar {
            width: 72px;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(8px);
            border-right: 1px solid #e9eef3;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 28px;
            z-index: 30;
            box-shadow: 2px 0 12px rgba(0,0,0,0.02);
        }

        .sidebar-icon {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            font-size: 1.4rem;
            color: #4a5568;
            cursor: pointer;
            transition: 0.2s;
            background: transparent;
            border: none;
        }

        .sidebar-icon:hover {
            background: #f0f2f5;
            color: #2563eb;
        }

        .sidebar-icon.active {
            background: #eef2ff;
            color: #2563eb;
            box-shadow: inset 0 0 0 1px #cbd5e1;
        }

        .divider {
            width: 40px;
            height: 1px;
            background: #e2e8f0;
            margin: 4px 0;
        }

        /* Top toolbar */
        .top-toolbar {
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 6px 18px;
            display: flex;
            gap: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            z-index: 40;
            border: 1px solid #eef2f6;
        }

        .tool-btn {
            background: transparent;
            border: none;
            padding: 8px 12px;
            border-radius: 32px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            color: #1e293b;
        }

        .tool-btn i {
            margin-right: 6px;
        }

        .tool-btn.active {
            background: #2563eb;
            color: white;
        }

        .props-panel {
            position: absolute;
            right: 24px;
            top: 100px;
            width: 260px;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            padding: 18px;
            z-index: 45;
            border: 1px solid #eef2ff;
            backdrop-filter: blur(2px);
            transition: 0.2s;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px);
        }

        .props-panel.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .prop-row {
            margin-bottom: 14px;
        }

        .prop-row label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #334155;
            display: block;
            margin-bottom: 6px;
        }

        .status-bar {
            position: absolute;
            bottom: 14px;
            left: 90px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            color: white;
            padding: 5px 16px;
            border-radius: 40px;
            font-size: 12px;
            z-index: 50;
            font-weight: 500;
            pointer-events: none;
        }

        .canvas-wrapper {
            flex: 1;
            overflow: auto;
            position: relative;
            background: #fafbfd;
            cursor: default;
        }

        canvas {
            display: block;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.03);
        }

        .toast-msg {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 6px 20px;
            border-radius: 60px;
            font-size: 13px;
            z-index: 200;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }

        .save-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 50;
            display: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .saving {
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <button class="sidebar-icon" id="selectToolBtn" title="Select (V)"><i class="fas fa-mouse-pointer"></i></button>
        <button class="sidebar-icon" id="textToolBtn" title="Add Text"><i class="fas fa-font"></i></button>
        <button class="sidebar-icon" id="stickyToolBtn" title="Sticky Note"><i class="fas fa-sticky-note"></i></button>
        <div class="divider"></div>
        <button class="sidebar-icon" id="shapeRectBtn" title="Rectangle"><i class="far fa-square"></i></button>
        <button class="sidebar-icon" id="shapeCircleBtn" title="Circle"><i class="far fa-circle"></i></button>
        <button class="sidebar-icon" id="shapeArrowBtn" title="Arrow"><i class="fas fa-arrow-right"></i></button>
        <button class="sidebar-icon" id="penDrawBtn" title="Pen"><i class="fas fa-pen-fancy"></i></button>
        <div class="divider"></div>
        <button class="sidebar-icon" id="clearCanvasBtn" title="Clear"><i class="fas fa-trash-alt"></i></button>
    </div>

    <div class="top-toolbar">
        <button class="tool-btn" id="undoBtn"><i class="fas fa-undo"></i> Undo</button>
        <button class="tool-btn" id="redoBtn"><i class="fas fa-redo"></i> Redo</button>
        <div style="width:1px; background:#e2e8f0; margin:0 6px;"></div>
        <div class="color-preview" id="colorPreview" style="width:28px; height:28px; border-radius:50%; background:#000000; border:2px solid white; box-shadow:0 0 0 1px #ccc; cursor:pointer;"></div>
        <input type="color" id="colorPicker" style="display:none">
        <input type="range" id="brushSizeRange" min="1" max="30" value="3" style="width:80px">
        <span id="sizeValue" style="font-size:12px;">3px</span>
        <button class="tool-btn" id="saveBtn"><i class="fas fa-save"></i> Save</button>
        <button class="tool-btn" id="exportBtn"><i class="fas fa-download"></i> Export</button>
    </div>

    <div id="propsPanel" class="props-panel">
        <h4 style="margin-bottom:12px;">🖌️ Object Properties</h4>
        <div class="prop-row">
            <label>🎨 Fill Color</label>
            <input type="color" id="propFillColor" style="width:100%">
        </div>
        <div class="prop-row">
            <label>📏 Stroke Width</label>
            <input type="range" id="propStrokeWidth" min="0" max="20" value="2">
        </div>
        <div class="prop-row">
            <label>🔘 Opacity</label>
            <input type="range" id="propOpacity" min="0" max="1" step="0.01" value="1">
        </div>
        <button id="deleteObjectBtn" style="background:#fee2e2; border:none; padding:6px; border-radius:40px; width:100%; margin-top:8px;">🗑️ Delete</button>
    </div>

    <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="whiteboardCanvas" width="3000" height="2400"></canvas>
    </div>
    
    <div class="status-bar">
        <span id="cursorPos">📍 0,0</span> | <span id="zoomLevel">🔍 100%</span> | <span id="objCount">📦 0 objects</span>
    </div>
    
    <div id="toastMsg" class="toast-msg">✨ Ready</div>
    <div id="saveIndicator" class="save-indicator">💾 Saved</div>
</div>

<script>
    // Get board ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const boardId = urlParams.get('id');
    
    if (!boardId) {
        window.location.href = 'dashboard.html';
    }
    
    let canvas;
    let currentMode = 'select';
    let currentColor = '#000000';
    let currentBrushWidth = 3;
    let historyStack = [];
    let historyIndex = -1;
    let zoomLevel = 1;
    let gridVisible = true;
    let spacePressed = false;
    let panning = false;
    let startPan = { x: 0, y: 0, scrollLeft: 0, scrollTop: 0 };
    const wrapper = document.getElementById('canvasWrapper');
    let selectedObject = null;
    let autoSaveTimeout = null;
    let isSaving = false;
    
    const API_URL = window.location.origin + '/whiteboard/api';
    
    // Load board content
    async function loadBoard() {
        try {
            const response = await fetch(`${API_URL}/boards/${boardId}`);
            if (response.ok) {
                const board = await response.json();
                document.title = `${board.name} - Whiteboard Pro`;
                
                if (board.content && board.content !== '{}') {
                    const content = JSON.parse(board.content);
                    if (content.canvasData) {
                        canvas.loadFromJSON(content.canvasData, () => {
                            canvas.renderAll();
                            saveToHistory();
                            showToast('Board loaded');
                        });
                    }
                }
            }
        } catch (error) {
            console.error('Failed to load board:', error);
            showToast('Failed to load board');
        }
    }
    
    // Save board content
    async function saveBoard(showNotification = false) {
        if (isSaving) return;
        isSaving = true;
        
        const indicator = document.getElementById('saveIndicator');
        indicator.style.display = 'block';
        indicator.classList.add('saving');
        indicator.textContent = '💾 Saving...';
        
        try {
            const canvasData = JSON.stringify(canvas.toJSON());
            const response = await fetch(`${API_URL}/boards/${boardId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: JSON.stringify({ canvasData }) })
            });
            
            if (response.ok) {
                if (showNotification) {
                    indicator.textContent = '✅ Saved!';
                    setTimeout(() => {
                        indicator.style.display = 'none';
                        indicator.classList.remove('saving');
                    }, 2000);
                } else {
                    setTimeout(() => {
                        indicator.style.display = 'none';
                        indicator.classList.remove('saving');
                    }, 1000);
                }
            }
        } catch (error) {
            console.error('Failed to save:', error);
            indicator.textContent = '❌ Save failed';
            setTimeout(() => {
                indicator.style.display = 'none';
                indicator.classList.remove('saving');
            }, 2000);
        }
        
        isSaving = false;
    }
    
    function initCanvas() {
        const canvasEl = document.getElementById('whiteboardCanvas');
        canvas = new fabric.Canvas(canvasEl, {
            backgroundColor: '#ffffff',
            selection: true,
            preserveObjectStacking: true,
            width: 3000,
            height: 2400
        });
        canvas.setDimensions({ width: 3000, height: 2400 });
        setupGridBackground();
        
        canvas.freeDrawingBrush = new fabric.PencilBrush(canvas);
        canvas.freeDrawingBrush.color = currentColor;
        canvas.freeDrawingBrush.width = currentBrushWidth;
        canvas.isDrawingMode = false;
        
        // History events
        canvas.on('object:added', () => { saveToHistory(); updateUI(); autoSave(); });
        canvas.on('object:modified', () => { saveToHistory(); updateUI(); autoSave(); });
        canvas.on('object:removed', () => { saveToHistory(); updateUI(); autoSave(); });
        canvas.on('selection:created', (e) => { updatePropertiesPanel(e.selected?.[0]); });
        canvas.on('selection:updated', (e) => { updatePropertiesPanel(e.selected?.[0]); });
        canvas.on('selection:cleared', () => { hidePropsPanel(); });
        canvas.on('mouse:move', (e) => {
            const pointer = canvas.getPointer(e.e);
            document.getElementById('cursorPos').innerHTML = `📍 ${Math.round(pointer.x)},${Math.round(pointer.y)}`;
        });
        
        wrapper.addEventListener('wheel', handleZoom, { passive: false });
        wrapper.addEventListener('mousedown', onPanStart);
        window.addEventListener('mousemove', onPanMove);
        window.addEventListener('mouseup', onPanEnd);
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') { spacePressed = true; wrapper.style.cursor = 'grab'; e.preventDefault(); } });
        window.addEventListener('keyup', (e) => { if (e.code === 'Space') { spacePressed = false; wrapper.style.cursor = 'default'; } });
        
        saveToHistory();
        updateUI();
        setMode('select');
        applyGridPattern();
        
        loadBoard();
    }
    
    function setupGridBackground() {
        const patternCanvas = document.createElement('canvas');
        const size = 24;
        patternCanvas.width = size;
        patternCanvas.height = size;
        const ctx = patternCanvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, size, size);
        ctx.fillStyle = '#cbd5e1';
        ctx.beginPath();
        ctx.arc(size/2, size/2, 1.2, 0, Math.PI*2);
        ctx.fill();
        const pattern = new fabric.Pattern({ source: patternCanvas, repeat: 'repeat' });
        canvas.setBackgroundColor(pattern, canvas.renderAll.bind(canvas));
    }
    
    function applyGridPattern() { if (gridVisible) setupGridBackground(); else canvas.setBackgroundColor('#ffffff', canvas.renderAll.bind(canvas)); }
    
    function saveToHistory() {
        const state = JSON.stringify(canvas.toJSON());
        historyStack = historyStack.slice(0, historyIndex + 1);
        historyStack.push(state);
        historyIndex++;
        updateUI();
    }
    
    function autoSave() {
        if (autoSaveTimeout) clearTimeout(autoSaveTimeout);
        autoSaveTimeout = setTimeout(() => saveBoard(false), 3000);
    }
    
    function undo() { if (historyIndex > 0) { historyIndex--; loadFromStack(); } else showToast('Nothing to undo'); }
    function redo() { if (historyIndex < historyStack.length - 1) { historyIndex++; loadFromStack(); } else showToast('Nothing to redo'); }
    
    function loadFromStack() {
        canvas.loadFromJSON(historyStack[historyIndex], () => { canvas.renderAll(); updateUI(); hidePropsPanel(); autoSave(); });
    }
    
    function setMode(mode) {
        currentMode = mode;
        if (mode === 'select') {
            canvas.isDrawingMode = false;
            canvas.selection = true;
        } else if (mode === 'pen') {
            canvas.isDrawingMode = true;
            canvas.selection = false;
            canvas.freeDrawingBrush = new fabric.PencilBrush(canvas);
            canvas.freeDrawingBrush.color = currentColor;
            canvas.freeDrawingBrush.width = currentBrushWidth;
        }
        document.querySelectorAll('.sidebar-icon, .tool-btn').forEach(el => el.classList.remove('active'));
        if (mode === 'select') document.getElementById('selectToolBtn')?.classList.add('active');
        if (mode === 'pen') document.getElementById('penDrawBtn')?.classList.add('active');
    }
    
    function getViewportCenter() {
        const scrollLeft = wrapper.scrollLeft;
        const scrollTop = wrapper.scrollTop;
        const centerX = scrollLeft + wrapper.clientWidth / 2;
        const centerY = scrollTop + wrapper.clientHeight / 2;
        return { x: Math.max(50, centerX), y: Math.max(50, centerY) };
    }
    
    function addShape(type) {
        const { x, y } = getViewportCenter();
        let shape;
        switch(type) {
            case 'rect': shape = new fabric.Rect({ left: x-60, top: y-50, width: 120, height: 100, fill: currentColor+'60', stroke: currentColor, strokeWidth: 3, rx: 8 }); break;
            case 'circle': shape = new fabric.Circle({ left: x-50, top: y-50, radius: 55, fill: currentColor+'60', stroke: currentColor, strokeWidth: 3 }); break;
            case 'arrow': 
                const line = new fabric.Line([x-60, y, x+40, y], { stroke: currentColor, strokeWidth: 4 });
                const head = new fabric.Triangle({ left: x+32, top: y-12, width: 22, height: 22, fill: currentColor, angle: 90 });
                shape = new fabric.Group([line, head], { left: x-60, top: y-12 });
                break;
        }
        if(shape) { canvas.add(shape); canvas.renderAll(); saveToHistory(); showToast(`${type} added`); }
    }
    
    function addStickyNote() {
        const { x, y } = getViewportCenter();
        const noteBg = new fabric.Rect({ width: 160, height: 130, fill: '#fef9c3', rx: 12, shadow: '2px 2px 6px rgba(0,0,0,0.1)' });
        const text = new fabric.Text('Write note', { fontSize: 14, left: 12, top: 12, fill: '#334155' });
        const group = new fabric.Group([noteBg, text], { left: x-80, top: y-65 });
        canvas.add(group); canvas.renderAll(); saveToHistory(); showToast('Sticky note');
    }
    
    function addText() {
        const { x, y } = getViewportCenter();
        const textObj = new fabric.IText('Double-click to edit', { left: x-50, top: y-20, fontSize: 24, fill: currentColor, fontFamily: 'Inter' });
        canvas.add(textObj); canvas.renderAll(); saveToHistory();
    }
    
    function updatePropertiesPanel(obj) {
        if(!obj || obj.type === 'activeSelection') { hidePropsPanel(); return; }
        selectedObject = obj;
        const panel = document.getElementById('propsPanel');
        panel.classList.add('visible');
        document.getElementById('propFillColor').value = obj.fill || '#ffffff';
        document.getElementById('propStrokeWidth').value = obj.strokeWidth || 2;
        document.getElementById('propOpacity').value = obj.opacity !== undefined ? obj.opacity : 1;
    }
    
    function hidePropsPanel() { document.getElementById('propsPanel').classList.remove('visible'); selectedObject = null; }
    
    function applyPropChanges() {
        if(!selectedObject) return;
        const fill = document.getElementById('propFillColor').value;
        const strokeW = parseInt(document.getElementById('propStrokeWidth').value);
        const opacity = parseFloat(document.getElementById('propOpacity').value);
        selectedObject.set({ fill: fill, strokeWidth: strokeW, opacity: opacity });
        selectedObject.setCoords();
        canvas.renderAll();
        saveToHistory();
    }
    
    function deleteSelected() { if(selectedObject) { canvas.remove(selectedObject); canvas.renderAll(); saveToHistory(); hidePropsPanel(); showToast('Deleted'); } }
    
    function updateUI() { document.getElementById('objCount').innerHTML = `📦 ${canvas.getObjects().length} objects`; }
    
    function showToast(msg) { const t = document.getElementById('toastMsg'); t.innerText = msg; t.style.opacity='1'; setTimeout(()=> t.style.opacity='0', 1800); }
    
    function handleZoom(e) {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        let newZoom = zoomLevel * delta;
        newZoom = Math.min(3, Math.max(0.3, newZoom));
        if(newZoom === zoomLevel) return;
        const rect = wrapper.getBoundingClientRect();
        const mouseX = e.clientX - rect.left + wrapper.scrollLeft;
        const mouseY = e.clientY - rect.top + wrapper.scrollTop;
        const zoomPoint = new fabric.Point(mouseX, mouseY);
        canvas.zoomToPoint(zoomPoint, newZoom);
        zoomLevel = newZoom;
        document.getElementById('zoomLevel').innerHTML = `🔍 ${Math.round(zoomLevel*100)}%`;
    }
    
    function resetZoom() { canvas.setZoom(1); zoomLevel=1; canvas.renderAll(); document.getElementById('zoomLevel').innerHTML='🔍 100%'; }
    
    function onPanStart(e) {
        if((spacePressed || e.button === 1) && !canvas.isDrawingMode) {
            panning = true;
            startPan = { x: e.clientX, y: e.clientY, scrollLeft: wrapper.scrollLeft, scrollTop: wrapper.scrollTop };
            wrapper.style.cursor = 'grabbing';
            e.preventDefault();
        }
    }
    
    function onPanMove(e) {
        if(!panning) return;
        const dx = e.clientX - startPan.x;
        const dy = e.clientY - startPan.y;
        wrapper.scrollLeft = startPan.scrollLeft - dx;
        wrapper.scrollTop = startPan.scrollTop - dy;
        e.preventDefault();
    }
    
    function onPanEnd() { panning = false; wrapper.style.cursor = spacePressed ? 'grab' : 'default'; }
    
    function exportAsImage() {
        const dataURL = canvas.toDataURL({ format: 'png', multiplier: 2 });
        const link = document.createElement('a');
        link.download = 'whiteboard-export.png';
        link.href = dataURL;
        link.click();
        showToast('Exported as PNG');
    }
    
    function clearCanvas() {
        if(confirm('Clear entire canvas? This cannot be undone.')) {
            canvas.clear();
            canvas.backgroundColor = '#ffffff';
            setupGridBackground();
            canvas.renderAll();
            saveToHistory();
            showToast('Canvas cleared');
        }
    }
    
    // Event listeners
    document.getElementById('selectToolBtn').onclick = () => setMode('select');
    document.getElementById('penDrawBtn').onclick = () => setMode('pen');
    document.getElementById('textToolBtn').onclick = () => addText();
    document.getElementById('stickyToolBtn').onclick = () => addStickyNote();
    document.getElementById('shapeRectBtn').onclick = () => addShape('rect');
    document.getElementById('shapeCircleBtn').onclick = () => addShape('circle');
    document.getElementById('shapeArrowBtn').onclick = () => addShape('arrow');
    document.getElementById('undoBtn').onclick = () => undo();
    document.getElementById('redoBtn').onclick = () => redo();
    document.getElementById('saveBtn').onclick = () => saveBoard(true);
    document.getElementById('exportBtn').onclick = () => exportAsImage();
    document.getElementById('clearCanvasBtn').onclick = () => clearCanvas();
    document.getElementById('deleteObjectBtn').onclick = () => deleteSelected();
    document.getElementById('propFillColor').addEventListener('change', applyPropChanges);
    document.getElementById('propStrokeWidth').addEventListener('input', applyPropChanges);
    document.getElementById('propOpacity').addEventListener('input', applyPropChanges);
    
    document.getElementById('colorPreview').onclick = () => document.getElementById('colorPicker').click();
    document.getElementById('colorPicker').addEventListener('change', (e) => { 
        currentColor = e.target.value; 
        document.getElementById('colorPreview').style.backgroundColor = currentColor; 
        if(canvas.freeDrawingBrush) canvas.freeDrawingBrush.color = currentColor;
    });
    
    document.getElementById('brushSizeRange').addEventListener('input', (e) => { 
        currentBrushWidth = parseInt(e.target.value); 
        document.getElementById('sizeValue').innerHTML = currentBrushWidth+'px'; 
        if(canvas.freeDrawingBrush) canvas.freeDrawingBrush.width = currentBrushWidth;
    });
    
    // Save before leaving
    window.addEventListener('beforeunload', (e) => {
        if (historyStack.length > 0) {
            saveBoard(false);
        }
    });
    
    initCanvas();
    setMode('select');
    showToast('Whiteboard ready!');
</script>
</body>
</html>
